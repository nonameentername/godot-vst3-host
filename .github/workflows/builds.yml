name: builds

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.ref }}

jobs:
  linux-build:
    name: Linux/Ubuntu build
    runs-on: ubuntu-latest
    env:
      VERSION: v1
    steps:
      - name: Checkout source code
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Bootstrap VCPKG
        run: ./modules/vcpkg/bootstrap-vcpkg.sh

      - name: Update minor version
        id: tag
        uses: anothrNick/github-tag-action@1.36.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DRY_RUN: true
          RELEASE_BRANCHES: none

      - uses: benjlevesque/short-sha@v3.0
        id: short-sha
        with:
          length: 6

      - name: Build godot-vst3-host (Debug)
        uses: nonameentername/docker-run-action@v3
        with:
          image: ghcr.io/nonameentername/godot-vst3host-ubuntu:${{ env.VERSION }}
          options: -v ${{ github.workspace }}:${{ github.workspace }} --workdir ${{ github.workspace }} -e BUILD_SHA -e TAG_VERSION
          run: |
            ./platform/ubuntu/build_debug.sh
        env:
          BUILD_SHA: ${{ steps.short-sha.outputs.sha }}
          TAG_VERSION: ${{ steps.tag.outputs.new_tag }}

      - name: Build godot-vst3-host (Release)
        uses: nonameentername/docker-run-action@v3
        with:
          image: ghcr.io/nonameentername/godot-vst3host-ubuntu:${{ env.VERSION }}
          options: -v ${{ github.workspace }}:${{ github.workspace }} --workdir ${{ github.workspace }} -e BUILD_SHA -e TAG_VERSION
          run: |
            ./platform/ubuntu/build_release.sh
        env:
          BUILD_SHA: ${{ steps.short-sha.outputs.sha }}
          TAG_VERSION: ${{ steps.tag.outputs.new_tag }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: addons/vst3-host/bin

  windows-build:
    name: Windows build
    runs-on: ubuntu-latest
    env:
      VERSION: v1
    steps:
      - name: Checkout source code
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Bootstrap VCPKG
        run: ./modules/vcpkg/bootstrap-vcpkg.sh

      - name: Update minor version
        id: tag
        uses: anothrNick/github-tag-action@1.36.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DRY_RUN: true
          RELEASE_BRANCHES: none

      - uses: benjlevesque/short-sha@v3.0
        id: short-sha
        with:
          length: 6

      - name: Build godot-vst3-host (Debug)
        uses: nonameentername/docker-run-action@v3
        with:
          image: ghcr.io/nonameentername/godot-vst3host-mingw:${{ env.VERSION }}
          options: -v ${{ github.workspace }}:${{ github.workspace }} --workdir ${{ github.workspace }} -e BUILD_SHA -e TAG_VERSION
          run: |
            ./platform/mingw/build_debug.sh
        env:
          BUILD_SHA: ${{ steps.short-sha.outputs.sha }}
          TAG_VERSION: ${{ steps.tag.outputs.new_tag }}

      - name: Build godot-vst3-host (Release)
        uses: nonameentername/docker-run-action@v3
        with:
          image: ghcr.io/nonameentername/godot-vst3host-mingw:${{ env.VERSION }}
          options: -v ${{ github.workspace }}:${{ github.workspace }} --workdir ${{ github.workspace }} -e BUILD_SHA -e TAG_VERSION
          run: |
            ./platform/mingw/build_release.sh
        env:
          BUILD_SHA: ${{ steps.short-sha.outputs.sha }}
          TAG_VERSION: ${{ steps.tag.outputs.new_tag }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: addons/vst3-host/bin
  
  macos-build-deps:
    name: MacOS build deps
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [debug, release]
        arch: [arm64, x86_64]
    env:
      VERSION: v1
    steps:
      - name: Checkout source code
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Bootstrap VCPKG
        run: ./modules/vcpkg/bootstrap-vcpkg.sh

      - name: Build vst3-host
        uses: nonameentername/docker-run-action@v3
        with:
          image: ghcr.io/nonameentername/godot-vst3host-osxcross:${{ env.VERSION }}
          options: -v ${{ github.workspace }}:${{ github.workspace }} --workdir ${{ github.workspace }}
          run: |
            ARCH=${{ matrix.arch }} ./platform/osxcross/build_deps_${{ matrix.environment }}.sh

      - name: Upload MacOS deps artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-deps-artifacts-${{ matrix.environment }}-${{ matrix.arch }}
          path: addons/vst3-host/bin

  macos-build:
    name: MacOS build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [debug, release]
    needs: [macos-build-deps]
    env:
      VERSION: v1
    steps:
      - name: Checkout source code
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Bootstrap VCPKG
        run: ./modules/vcpkg/bootstrap-vcpkg.sh

      - name: Update minor version
        id: tag
        uses: anothrNick/github-tag-action@1.36.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DRY_RUN: true
          RELEASE_BRANCHES: none

      - uses: benjlevesque/short-sha@v3.0
        id: short-sha
        with:
          length: 6

      - name: Download MacOS deps artifacts (arm64)
        uses: actions/download-artifact@v4
        with:
          name: macos-deps-artifacts-${{ matrix.environment }}-arm64
          path: addons/vst3-host/bin

      - name: Download MacOS deps artifacts (x86_64)
        uses: actions/download-artifact@v4
        with:
          name: macos-deps-artifacts-${{ matrix.environment }}-x86_64
          path: addons/vst3-host/bin

      - name: Build godot-vst3-host
        uses: nonameentername/docker-run-action@v3
        with:
          image: ghcr.io/nonameentername/godot-vst3host-osxcross:${{ env.VERSION }}
          options: -v ${{ github.workspace }}:${{ github.workspace }} --workdir ${{ github.workspace }} -e BUILD_SHA -e TAG_VERSION
          run: |
            ./platform/osxcross/build_lib_${{ matrix.environment }}.sh
            rm -rf addons/vst3-host/bin/osxcross-arm64
            rm -rf addons/vst3-host/bin/osxcross-x86_64
        env:
          BUILD_SHA: ${{ steps.short-sha.outputs.sha }}
          TAG_VERSION: ${{ steps.tag.outputs.new_tag }}

      - name: Upload MacOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts-${{ matrix.environment }}
          path: addons/vst3-host/bin

  verify-linux-build:
    name: Verify Linux/Ubuntu build
    runs-on: ubuntu-latest
    needs: linux-build
    steps:
      - name: Checkout source code
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: addons/vst3-host/bin

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.0
          use-dotnet: false
          include-templates: false

      - name: Godot import
        continue-on-error: true
        run: |
          godot --headless --import

      - name: Verify godot-vst3-host
        run: |
          godot --headless -s vst3host_run_scene.gd --quit-after 300 2> /dev/null | grep 'it works!'

  verify-macos-build:
    name: Verify MacOS build
    runs-on: macos-latest
    needs: macos-build
    steps:
      - name: Checkout source code
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Download MacOS artifacts (debug)
        uses: actions/download-artifact@v4
        with:
          name: macos-artifacts-debug
          path: addons/vst3-host/bin

      - name: Download MacOS artifacts (release)
        uses: actions/download-artifact@v4
        with:
          name: macos-artifacts-release
          path: addons/vst3-host/bin

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.0
          use-dotnet: false
          include-templates: false

      - name: Godot import
        continue-on-error: true
        run: |
          godot --headless --import

      - name: Verify godot-vst3-host
        run: |
          godot --headless -s vst3host_run_scene.gd --quit-after 300 2> /dev/null | grep 'it works!'

  verify-windows-build:
    name: Verify Windows build
    runs-on: windows-latest
    needs: windows-build
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout source code
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: addons/vst3-host/bin

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.0
          use-dotnet: false
          include-templates: false

      - name: Godot import
        continue-on-error: true
        run: |
          godot --headless --import

      - name: Verify godot-vst3-host
        run: |
          godot --headless -s vst3host_run_scene.gd --quit-after 300 2> NUL | grep 'it works!'

  publish_artifacts:
    if: ${{ github.ref == 'refs/heads/main' }}
    name: Publish Artifacts
    runs-on: ubuntu-latest
    needs: [verify-linux-build, verify-windows-build, verify-macos-build]
    steps:
      - name: Checkout source code
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: addons/vst3-host/bin

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: addons/vst3-host/bin


      - name: Download MacOS artifacts (debug)
        uses: actions/download-artifact@v4
        with:
          name: macos-artifacts-debug
          path: addons/vst3-host/bin

      - name: Download MacOS artifacts (release)
        uses: actions/download-artifact@v4
        with:
          name: macos-artifacts-release
          path: addons/vst3-host/bin

      - name: Update minor version
        id: tag
        uses: anothrNick/github-tag-action@1.36.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DRY_RUN: true
          RELEASE_BRANCHES: none

      - name: Zip godot-vst3-host artifact
        run: ./scripts/create_zip.sh godot-vst3host_${{ env.TAG_VERSION }}.zip
        env:
          TAG_VERSION: ${{ steps.tag.outputs.new_tag }}

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ github.token }}
          tag_name: ${{ env.TAG_VERSION }}
          generate_release_notes: true
          make_latest: true
          files: |
            godot-vst3host_${{ env.TAG_VERSION }}.zip
        env:
          TAG_VERSION: ${{ steps.tag.outputs.new_tag }}
